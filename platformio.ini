[env:esp32]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps = 
    bodmer/TFT_eSPI @ ^2.5.0
    PaulStoffregen/XPT2046_Touchscreen @ ^0.6
    bblanchon/ArduinoJSON @ ^6.21.0
    tzapu/WiFiManager @ ^0.16.0

build_flags = 
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_RST=4
    -DTFT_BL=32
    -DTFT_BACKLIGHT_ON=HIGH
    -DTOUCH_CS=33
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
